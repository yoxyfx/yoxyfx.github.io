<!DOCTYPE html>
<html>
    <head>
        <title>layout1</title>
        <meta charset="utf-8"/>
        <style>
            #wrap ul{}
            header ul{}
            #wrap>header>ul{}
            header ul{
                list-style: none;
                display: flex;
                margin:13px 0px;/*상하마진, 좌우 마진*/
            }
            header li{
                padding:0px 10px;
                border-right:solid 1px gray;
            }
            header li:last-child{
                border:none;
            }
            header{
                display: flex;
                justify-content:space-between;/*공간 나눠쓰게*/
            }
            header h1{
                margin: 0px;
            }
            header>div>img{
                margin: 13px 0px;
            }
            nav ul{
                list-style: none;
                display: flex;
            }
            nav li{
                padding: 0px 10px;
            }
            nav{
                display: flex;/*가로배치*/
                justify-content:space-between;
                background-color: lightgray;
            }
            nav h2{
                margin: 14px 0px;
            }
            #content>section:nth-child(1){background-color: #98f; }
            #content>section:nth-child(2){background-color:#5d9; }
            #content>section:nth-child(3){background-color: #f76; }
            #content>section:nth-child(4){background-color:  #ec5; }
            #content>section>div{
                display: flex;
                justify-content: center;
            }
            #content>section>div>div{
                margin: 0px 10px;
            }
            #content dt{
                font-weight:bold;
            }
            #content dd{
                margin: 0px;
            }
        </style>
    </head>
    <body>
        <div id="'wrap">
            <header>
                <h1><img src="logo.png"/></h1>
                <ul>
                    <li>ABOUT</li>
                    <li>SERVICES</li>
                    <li>WORKS</li>
                    <li>BLOG</li>
                    <li>CONTACT US</li>
                </ul>
                <div><img src="zoom.png"/></div>
            </header>
            <nav>
                <h2>See Our Works</h2>
                <ul>
                    <li>web design</li>
                    <li>icons</li>
                    <li>web design</li>
                    <li>web design</li>
                </ul>
                <div></div>
            </nav>
            <div id="content">
                <section>
                    <h3>Web design</h3>
                    <div>
                        <div>
                            <img src="img1.png"/>
                            <dl>
                                <dt>프로젝트 제목</dt>
                                <dd>프로젝트 내용</dd>
                            </dl>
                        </div>
                        <div>
                            <img src="img2.png"/>
                            <dl>
                                <dt>프로젝트 제목</dt>
                                <dd>프로젝트 내용</dd>
                            </dl>
                        </div>
                    </div>
                </section>

                <section>
                    <h3>Web design</h3>
                    <div>
                        <div>
                            <img src="img3.png"/>
                            <dl>
                                <dt>프로젝트 제목</dt>
                                <dd>프로젝트 내용</dd>
                            </dl>
                        </div>
                        <div>
                            <img src="img4.png"/>
                            <dl>
                                <dt>프로젝트 제목</dt>
                                <dd>프로젝트 내용</dd>
                            </dl>
                        </div>
                    </div>
                </section>
            </div>
            <footer>footer</footer>
        </div>
    </body>
</html>
