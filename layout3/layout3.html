<!DOCTYPE html>
<html>
    <head>
        <title>layout3</title>
        <meta charset="utf-8" />
        <style>
            header ul{
                list-style: none; /* 동그라미 제거*/
                display: flex; /*출력방식유연*/
                padding: 0px;
            }
            head li{
                padding-right: 0px 20px;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <header>
                <h1>Gridly</h1>
                <ul>
                    <li>home</li>
                    <li>digital design</li>
                    <li>web design</li>
                </ul>
            </header>
            <div id="content">content</div>
            <footer>footer</footer>
        </div>
    </body>
</html>
